<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>文件简单加解密工具</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			background: #f0f2f5;
			min-height: 100vh;
			display: flex;
			justify-content: center;
			padding: 20px;
		}

		.container {
			background: #fff;
			border-radius: 12px;
			box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
			width: 100%;
			max-width: 700px;
			padding: 32px;
		}

		h1 {
			font-size: 22px;
			color: #1a1a2e;
			margin-bottom: 8px;
		}

		.subtitle {
			color: #8c8c8c;
			font-size: 13px;
			line-height: 1.8;
			margin-bottom: 24px;
		}

		/* 打开目录区域 */
		.dir-area {
			border: 2px dashed #d9d9d9;
			border-radius: 8px;
			padding: 32px 20px;
			text-align: center;
			cursor: pointer;
			transition: all 0.2s;
			margin-bottom: 24px;
		}

		.dir-area:hover {
			border-color: #1677ff;
			background: #f0f5ff;
		}

		.dir-area p {
			color: #8c8c8c;
			font-size: 14px;
		}

		.dir-area .icon {
			font-size: 36px;
			margin-bottom: 8px;
		}

		.dir-path {
			display: flex;
			align-items: center;
			gap: 8px;
			padding: 10px 14px;
			background: #f6f8fa;
			border-radius: 6px;
			margin-bottom: 20px;
			font-size: 13px;
			color: #1a1a2e;
		}

		.close-dir-btn {
			margin-left: auto;
			padding: 4px 12px;
			border: 1px solid #d9d9d9;
			border-radius: 4px;
			background: #fff;
			color: #595959;
			font-size: 12px;
			cursor: pointer;
			transition: all 0.15s;
		}

		.close-dir-btn:hover {
			border-color: #ff4d4f;
			color: #ff4d4f;
		}

		.dir-path .badge {
			background: #e6f7ff;
			color: #1677ff;
			padding: 2px 8px;
			border-radius: 4px;
			font-size: 11px;
			flex-shrink: 0;
		}

		.dir-path .dir-name {
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
		}

		/* 文件列表 */
		.file-list {
			margin-bottom: 16px;
		}

		.file-list-header {
			display: flex;
			align-items: center;
			padding: 8px 14px;
			font-size: 12px;
			color: #8c8c8c;
			border-bottom: 1px solid #f0f0f0;
		}

		.file-row {
			display: flex;
			align-items: center;
			padding: 10px 14px;
			border-bottom: 1px solid #f0f0f0;
			font-size: 13px;
			transition: background 0.15s;
			cursor: pointer;
			user-select: none;
		}

		.file-row:hover {
			background: #fafafa;
		}

		.file-row.selected {
			background: #e6f4ff;
		}

		.file-row.selected:hover {
			background: #d6edff;
		}

		.file-row:last-child {
			border-bottom: none;
		}

		.file-row .col-check,
		.file-list-header .col-check {
			width: 30px;
			flex-shrink: 0;
		}

		.file-row .col-size,
		.file-list-header .col-size {
			width: 90px;
			flex-shrink: 0;
			text-align: right;
		}

		.file-row .col-name,
		.file-list-header .col-name {
			flex: 1;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
		}

		.file-row .col-name {
			color: #1a1a2e;
		}

		.file-row .col-status,
		.file-list-header .col-status {
			width: 70px;
			flex-shrink: 0;
			text-align: right;
			font-size: 12px;
		}

		/* 批量操作工具栏 */
		.batch-bar {
			display: flex;
			align-items: center;
			gap: 12px;
			margin-bottom: 16px;
		}

		.batch-btn {
			padding: 6px 20px;
			border: none;
			border-radius: 6px;
			font-size: 13px;
			cursor: pointer;
			transition: all 0.15s;
			font-weight: 500;
			background: #1677ff;
			color: #fff;
		}

		.batch-btn:hover {
			background: #4096ff;
		}

		.batch-btn:disabled {
			background: #d9d9d9;
			cursor: not-allowed;
		}

		.batch-bar .selected-hint {
			font-size: 12px;
			color: #8c8c8c;
		}

		.empty-hint {
			text-align: center;
			padding: 32px;
			color: #bfbfbf;
			font-size: 13px;
		}

		/* 浏览器兼容性指示 */
		.compat-bar {
			display: flex;
			justify-content: center;
			gap: 20px;
			margin-bottom: 16px;
			font-size: 12px;
		}

		.compat-item {
			display: flex;
			align-items: center;
			gap: 4px;
			padding: 3px 10px;
			border-radius: 10px;
			background: #fff2f0;
			color: #cf1322;
		}

		.compat-item.ok {
			background: #f6ffed;
			color: #389e0d;
		}

		.compat-icon {
			font-size: 11px;
		}

		/* 客户端信息 */
		.client-info {
			background: #f6f8fa;
			border-radius: 6px;
			padding: 10px 14px;
			margin-bottom: 16px;
			font-size: 12px;
			color: #595959;
			line-height: 1.8;
			display: none;
		}

		.client-info.loaded {
			display: block;
		}

		.client-info .info-grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 2px 16px;
		}

		.client-info .info-label {
			color: #8c8c8c;
		}

		.client-info .info-title {
			font-weight: 500;
			color: #1a1a2e;
			margin-bottom: 6px;
			font-size: 13px;
		}

		.key-badge {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			background: #f6f8fa;
			border-radius: 4px;
			padding: 4px 10px;
			font-size: 12px;
			color: #8c8c8c;
			margin-bottom: 16px;
		}

		.key-badge .dot {
			width: 6px;
			height: 6px;
			border-radius: 50%;
			background: #52c41a;
		}
	</style>
</head>

<body>
	<div class="container">
		<h1>文件简单加解密工具</h1>
		<p class="subtitle">
			AES-256-CTR · 流加密<br>
			输入输出长度完全相同,加密文件头尾各 100 字节,文件大小保持不变 <br>
			<br>
		</p>

		<!-- 浏览器兼容性 -->
		<div class="compat-bar" id="compatBar">
			<span class="compat-item" id="compatSecure"></span>
			<span class="compat-item" id="compatAPI"></span>
		</div>

		<!-- 客户端信息 -->
		<div class="client-info" id="clientInfo">
			<div class="info-title">客户端信息</div>
			<div class="info-grid" id="clientInfoGrid"></div>
		</div>

		<!-- 目录选择 -->
		<div class="dir-area" id="dirPicker" onclick="handleDirClick()">
			<div class="icon">📂</div>
			<p>点击选择目录</p>
		</div>

		<!-- 目录路径显示 -->
		<div class="dir-path" id="dirPath" style="display:none">
			<span class="badge" id="dirBadge">已打开</span>
			<span class="dir-name" id="dirName"></span>
			<button class="close-dir-btn" onclick="closeDirectory()">关闭目录</button>
		</div>

		<!-- 批量操作工具栏 -->
		<div class="batch-bar" id="batchBar" style="display:none">
			<button class="batch-btn" id="batchBtn" onclick="processSelected()" disabled>加解密</button>
			<span class="selected-hint" id="selectedHint"></span>
		</div>

		<!-- 文件列表 -->
		<div class="file-list" id="fileList">
			<div class="empty-hint">请先选择一个目录</div>
		</div>

	</div>

	<script>
		// ========== 浏览器兼容性检查 ==========

		(function checkCompat() {
			const secure = window.isSecureContext;
			const hasAPI = typeof window.showDirectoryPicker === 'function';

			function setItem(id, ok, label) {
				const el = document.getElementById(id);
				el.innerHTML = '<span class="compat-icon">' + (ok ? '&#x2705;' : '&#x274C;') + '</span> ' + label;
				if (ok) el.classList.add('ok');
			}

			setItem('compatSecure', secure, '安全上下文: ' + (secure ? '已启用' : '未启用'));
			setItem('compatAPI', hasAPI, '文件系统API: ' + (hasAPI ? '支持' : '不支持'));
			console.log('[compat] isSecureContext:', secure, '| showDirectoryPicker:', hasAPI);
		})();

		// ========== 获取客户端信息 ==========

		(function fetchClientInfo() {
			fetch('/api/getIP')
				.then(r => r.json())
				.then(data => {
					const map = {
						'IP 地址': data.ip,
						'国家/地区': data.country,
						'省份/州': data.region,
						'城市': data.city,
						'运营商': data.isp,
						'经纬度': data.latitude && data.longitude ? data.latitude + ', ' + data.longitude : '-',
						'ASN': data.asn,
					};
					let html = '';
					for (const [label, val] of Object.entries(map)) {
						html += '<div><span class="info-label">' + label + ':</span> ' + escapeHtml(String(val || '-')) + '</div>';
					}
					document.getElementById('clientInfoGrid').innerHTML = html;
					document.getElementById('clientInfo').classList.add('loaded');
				})
				.catch(err => {
					console.warn('[clientInfo] 获取失败:', err);
				});
		})();

		// ========== 浏览器端工具 ==========

		function base64ToArrayBuffer(base64) {
			const binary = atob(base64);
			const bytes = new Uint8Array(binary.length);
			for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
			return bytes.buffer;
		}

		function arrayBufferToBase64(buffer) {
			const bytes = new Uint8Array(buffer);
			let binary = '';
			for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
			return btoa(binary);
		}

		async function cryptoCall(headBuf, tailBuf) {
			const resp = await fetch('/api/crypto', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({
					head: arrayBufferToBase64(headBuf),
					tail: tailBuf ? arrayBufferToBase64(tailBuf) : null
				})
			});
			if (!resp.ok) {
				const err = await resp.json();
				throw new Error(err.error || '服务端加解密失败');
			}
			const data = await resp.json();
			return {
				head: base64ToArrayBuffer(data.head),
				tail: data.tail ? base64ToArrayBuffer(data.tail) : null
			};
		}

		// ========== 目录 & 文件列表 ==========

		let dirHandle = null;
		let fileEntries = [];  // { name, handle }
		let selectedSet = new Set();  // 选中的文件索引
		let processingCount = 0;
		let fileStatus = {};  // { index: 'done' | 'error' } 每文件处理状态
		let pickerActive = false;

		// ========== 目录操作 ==========

		// 非 async 函数，确保 showDirectoryPicker 在用户手势中同步调用
		function handleDirClick() {
			if (pickerActive) return;
			pickerActive = true;

			window.showDirectoryPicker({ mode: 'readwrite' }).then(async (handle) => {
				console.log('[dirClick] 已选择目录:', handle.name);
				dirHandle = handle;
				document.getElementById('dirPicker').style.display = 'none';
				document.getElementById('dirPath').style.display = 'flex';
				document.getElementById('dirName').textContent = handle.name;
				await scanFiles();
			}).catch((err) => {
				console.error('[dirClick] 异常:', err.name, err.message);
			}).finally(() => {
				pickerActive = false;
			});
		}

		function closeDirectory() {
			if (processingCount > 0) return;
			dirHandle = null;
			fileEntries = [];
			document.getElementById('dirPicker').style.display = '';
			document.getElementById('dirPath').style.display = 'none';
			document.getElementById('fileList').innerHTML = '<div class="empty-hint">请先选择一个目录</div>';
		}

		async function scanFiles() {
			console.log('[scanFiles] 开始扫描目录...');
			fileEntries = [];
			try {
				for await (const entry of dirHandle.values()) {
					console.log('[scanFiles] 遍历到条目:', entry.name, 'kind:', entry.kind);
					if (entry.kind === 'file' && !entry.name.startsWith('.')) {
						fileEntries.push({ name: entry.name, handle: entry });
					}
				}
			} catch (err) {
				console.error('[scanFiles] 遍历目录失败:', err);
				return;
			}
			fileEntries.sort((a, b) => a.name.localeCompare(b.name));
			console.log('[scanFiles] 扫描完成，文件数:', fileEntries.length);
			renderFileList();
		}

		function renderFileList() {
			const listEl = document.getElementById('fileList');
			console.log('[renderFileList] 渲染文件列表, 文件数:', fileEntries.length);

			if (!dirHandle || fileEntries.length === 0) {
				const msg = !dirHandle ? '请先选择一个目录' : '该目录下没有文件';
				listEl.innerHTML = '<div class="empty-hint">' + msg + '</div>';
				document.getElementById('batchBar').style.display = 'none';
				return;
			}

			selectedSet.clear();
			fileStatus = {};

			let html = '<div class="file-list-header">'
				+ '<span class="col-check"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()" title="全选"></span>'
				+ '<span class="col-name">文件名（共 ' + fileEntries.length + ' 个文件）</span>'
				+ '<span class="col-size">大小</span>'
				+ '<span class="col-status">状态</span>'
				+ '</div>';
			for (let i = 0; i < fileEntries.length; i++) {
				const entry = fileEntries[i];
				html += '<div class="file-row" onclick="toggleSelect(' + i + ')">'
					+ '<span class="col-check"><input type="checkbox" id="cb-' + i + '" onclick="event.stopPropagation()" onchange="toggleSelect(' + i + ')"></span>'
					+ '<span class="col-name" title="' + escapeHtml(entry.name) + '">' + escapeHtml(entry.name) + '</span>'
					+ '<span class="col-size" id="file-row-' + i + '-size">-</span>'
					+ '<span class="col-status" id="file-row-' + i + '-status"></span>'
					+ '</div>';
			}
			listEl.innerHTML = html;

			document.getElementById('batchBar').style.display = 'flex';
			updateBatchUI();

			for (let i = 0; i < fileEntries.length; i++) {
				loadFileSize(i);
			}
		}

		function toggleSelect(index) {
			if (selectedSet.has(index)) {
				selectedSet.delete(index);
			} else {
				selectedSet.add(index);
			}
			const cb = document.getElementById('cb-' + index);
			if (cb) {
				cb.checked = selectedSet.has(index);
				cb.closest('.file-row').classList.toggle('selected', selectedSet.has(index));
			}
			updateSelectAllCheckbox();
			updateBatchUI();
		}

		function toggleSelectAll() {
			const selectAll = document.getElementById('selectAll');
			if (selectAll.checked) {
				for (let i = 0; i < fileEntries.length; i++) {
					selectedSet.add(i);
					const cb = document.getElementById('cb-' + i);
					if (cb) { cb.checked = true; cb.closest('.file-row').classList.add('selected'); }
				}
			} else {
				selectedSet.clear();
				for (let i = 0; i < fileEntries.length; i++) {
					const cb = document.getElementById('cb-' + i);
					if (cb) { cb.checked = false; cb.closest('.file-row').classList.remove('selected'); }
				}
			}
			updateBatchUI();
		}

		function updateSelectAllCheckbox() {
			const selectAll = document.getElementById('selectAll');
			if (!selectAll) return;
			selectAll.checked = selectedSet.size === fileEntries.length;
			selectAll.indeterminate = selectedSet.size > 0 && selectedSet.size < fileEntries.length;
		}

		function updateBatchUI() {
			const btn = document.getElementById('batchBtn');
			const hint = document.getElementById('selectedHint');
			btn.disabled = selectedSet.size === 0 || processingCount > 0;
			hint.textContent = selectedSet.size > 0
				? '已选 ' + selectedSet.size + ' / ' + fileEntries.length + ' 个文件'
				: '';
		}

		async function loadFileSize(index) {
			try {
				const file = await fileEntries[index].handle.getFile();
				document.getElementById('file-row-' + index + '-size').textContent = formatSize(file.size);
			} catch (e) { /* 读取失败就显示 - */ }
		}

		function escapeHtml(str) {
			const el = document.createElement('span');
			el.textContent = str;
			return el.innerHTML;
		}

		// FileReader 超时包装（5 秒）
		function readBlobWithTimeout(blob, timeoutMs = 5000) {
			return Promise.race([
				new Promise((resolve, reject) => {
					const r = new FileReader();
					r.onload = () => resolve(r.result);
					r.onerror = () => reject(r.error || new Error('文件读取失败'));
					r.readAsArrayBuffer(blob);
				}),
				new Promise((_, reject) =>
					setTimeout(() => reject(new Error('文件读取超时，可能被其他程序占用，请关闭该文件后重试')), timeoutMs)
				)
			]);
		}

		async function processSelected() {
			if (selectedSet.size === 0 || processingCount > 0) return;

			const indices = Array.from(selectedSet);

			// 标记所有选中文件状态
			for (const i of indices) {
				fileStatus[i] = 'processing';
				updateFileStatus(i);
			}
			updateBatchUI();

			// 逐个处理
			for (const i of indices) {
				await processOneFile(i);
			}
		}

		function updateFileStatus(index) {
			const el = document.getElementById('file-row-' + index + '-status');
			if (!el) return;
			switch (fileStatus[index]) {
				case 'processing':
					el.textContent = '处理中...';
					el.style.color = '#1677ff';
					break;
				case 'done':
					el.textContent = '已完成';
					el.style.color = '#389e0d';
					break;
				case 'error':
					el.textContent = '失败';
					el.style.color = '#cf1322';
					break;
				default:
					el.textContent = '';
			}
		}

		async function processOneFile(index) {
			const entry = fileEntries[index];
			if (!entry) return;

			processingCount++;
			updateBatchUI();

			try {
				const HEAD_SIZE = 100, TAIL_SIZE = 100;

				console.log('[processOneFile] 开始处理:', entry.name);
				const file = await entry.handle.getFile();
				const fileSize = file.size;
				console.log('[processOneFile] 文件大小:', fileSize, 'bytes');

				const headBuf = await readBlobWithTimeout(file.slice(0, HEAD_SIZE));
				const tailBuf = fileSize > HEAD_SIZE + TAIL_SIZE
					? await readBlobWithTimeout(file.slice(fileSize - TAIL_SIZE))
					: null;
				console.log('[processOneFile] 文件读取完成，提交到服务端...');

				const result = await cryptoCall(headBuf, tailBuf);
				console.log('[processOneFile] 加解密完成，开始写入文件...');
				const writeStart = performance.now();
				// keepExistingData: true 要求浏览器保留文件原有内容。
				// 浏览器实现中，对于大文件（如1GB），这会触发全量加载，导致耗时较长。
				// 目前 File System Access API 对用户选择的文件不支持原地局部写入，
				// 这是已知限制。
				const writable = await entry.handle.createWritable({ keepExistingData: true });
				let writeElapsed = performance.now() - writeStart;
				console.log('[processOneFile] 加载文件完成，耗时', writeElapsed < 1000 ? writeElapsed.toFixed(2) + ' ms' : (writeElapsed / 1000).toFixed(1) + ' s');
				await writable.write(result.head);
				if (result.tail) {
					await writable.seek(fileSize - TAIL_SIZE);
					await writable.write(result.tail);
				}
				await writable.close();
				writeElapsed = performance.now() - writeStart;
				console.log('[processOneFile] 写入完成，耗时', writeElapsed < 1000 ? writeElapsed.toFixed(2) + ' ms' : (writeElapsed / 1000).toFixed(1) + ' s');

				fileStatus[index] = 'done';
				updateFileStatus(index);

			} catch (err) {
				console.error('[processOneFile] 失败:', err);
				fileStatus[index] = 'error';
				updateFileStatus(index);
			} finally {
				processingCount--;
				updateBatchUI();
			}
		}

		function formatSize(bytes) {
			if (bytes < 1024) return bytes + ' B';
			if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
			return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
		}
	</script>
</body>

</html>
